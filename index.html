<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORT.EXE — Algorithm Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --border: #242424;
            --text: #e8e8e8;
            --muted: #555;
            --accent: #c8f04c;
            --accent-dim: rgba(200, 240, 76, 0.12);
            --comparing: #38bdf8;
            --swapping: #f472b6;
            --sorted: #4ade80;
            --pivot: #fbbf24;
            --bar-default: #2a2a2a;
            --label-color: #888;
        }

        [data-theme="light"] {
            --bg: #f5f5f0;
            --border: #d0d0c8;
            --text: #1a1a1a;
            --muted: #999;
            --accent: #5a8a00;
            --accent-dim: rgba(90, 138, 0, 0.1);
            --comparing: #0284c7;
            --swapping: #be185d;
            --sorted: #16a34a;
            --pivot: #d97706;
            --bar-default: #c0c0b8;
            --label-color: #555;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── Layout ─── */
        .app {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ─── Header ─── */
        header {
            padding: 40px 0 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 20px;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }

        .logo-dot { color: var(--muted); }

        .tagline {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ─── Theme toggle ─── */
        .theme-toggle {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 14px;
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
        .theme-icon { font-size: 0.9rem; }

        /* ─── Controls ─── */
        .controls {
            padding: 28px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            align-items: flex-end;
            border-bottom: 1px solid var(--border);
        }

        .control-group { display: flex; flex-direction: column; gap: 10px; }

        .control-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Algorithm picker */
        .algo-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .algo-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 14px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .algo-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .algo-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #0d0d0d;
            font-weight: 700;
        }

        /* Sliders */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-val {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent);
            min-width: 32px;
            text-align: right;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 140px;
            height: 2px;
            background: var(--border);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Action buttons */
        .actions { display: flex; gap: 8px; }

        .btn {
            padding: 9px 22px;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid;
            background: transparent;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }

        .btn-start { border-color: var(--accent); color: var(--accent); }
        .btn-start:hover:not(:disabled) { background: var(--accent); color: #0d0d0d; }

        .btn-pause { border-color: var(--comparing); color: var(--comparing); }
        .btn-pause:hover:not(:disabled) { background: var(--comparing); color: #0d0d0d; }

        .btn-reset { border-color: var(--border); color: var(--muted); }
        .btn-reset:hover:not(:disabled) { border-color: var(--text); color: var(--text); }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ─── Stats ─── */
        .stats {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
        }

        .stat {
            flex: 1;
            padding: 16px 20px;
            border-right: 1px solid var(--border);
        }

        .stat:last-child { border-right: none; }

        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.62rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat-value.highlight { color: var(--accent); }

        /* ─── Visualization ─── */
        .vis-wrap {
            padding: 32px 0 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        #canvas {
            width: 100%;
            height: clamp(300px, 45vh, 500px);
            display: flex;
            align-items: flex-end;
            gap: 1px;
            padding-top: 24px;
        }

        .bar {
            flex: 1;
            border-radius: 2px 2px 0 0;
            transition: height 0.05s ease, background 0.05s;
            background: var(--bar-default);
            min-width: 1px;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .bar-label {
            position: absolute;
            top: -18px;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--label-color);
            white-space: nowrap;
            display: none;
            user-select: none;
        }

        .show-labels .bar-label { display: block; }

        .bar.comparing { background: var(--comparing); }
        .bar.swapping   { background: var(--swapping); }
        .bar.sorted     { background: var(--sorted); }
        .bar.pivot      { background: var(--pivot); }

        /* ─── Legend ─── */
        .legend {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ─── Footer ─── */
        footer {
            padding: 20px 0;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .footer-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        /* ─── Complexity badge ─── */
        .complexity-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            border-radius: 100px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .complexity-badge.visible { opacity: 1; }

        /* responsive */
        @media (max-width: 700px) {
            .controls { gap: 20px; }
            input[type="range"] { width: 100px; }
            .stats { flex-wrap: wrap; }
            .stat { min-width: 50%; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>
<div class="app">

    <header>
        <div class="logo">SORT<span class="logo-dot">.</span>EXE</div>
        <div class="tagline">Algorithm Visualizer</div>
        <button class="theme-toggle" id="themeToggle">
            <span class="theme-icon">☀️</span><span id="themeLabel">Light</span>
        </button>
    </header>

    <div class="controls">
        <!-- Algorithm -->
        <div class="control-group" style="flex:1; min-width:280px;">
            <div class="control-label">Algorithm</div>
            <div class="algo-list" id="algoList">
                <button class="algo-btn" data-algo="bubble"    data-complexity="O(n²)">Bubble</button>
                <button class="algo-btn" data-algo="selection" data-complexity="O(n²)">Selection</button>
                <button class="algo-btn" data-algo="insertion" data-complexity="O(n²)">Insertion</button>
                <button class="algo-btn" data-algo="merge"     data-complexity="O(n log n)">Merge</button>
                <button class="algo-btn" data-algo="quick"     data-complexity="O(n log n) avg">Quick</button>
                <button class="algo-btn" data-algo="heap"      data-complexity="O(n log n)">Heap</button>
                <button class="algo-btn" data-algo="shell"     data-complexity="O(n log² n)">Shell</button>
            </div>
        </div>

        <!-- Array size -->
        <div class="control-group">
            <div class="control-label">Array Size</div>
            <div class="slider-row">
                <input type="range" id="sizeSlider" min="10" max="150" value="60">
                <span class="slider-val" id="sizeVal">60</span>
            </div>
        </div>

        <!-- Speed -->
        <div class="control-group">
            <div class="control-label">Delay (ms)</div>
            <div class="slider-row">
                <input type="range" id="speedSlider" min="1" max="200" value="40">
                <span class="slider-val" id="speedVal">40</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="control-group">
            <div class="control-label">&nbsp;</div>
            <div class="actions">
                <button class="btn btn-start" id="startBtn">Start</button>
                <button class="btn btn-pause" id="pauseBtn" disabled>Pause</button>
                <button class="btn btn-reset" id="resetBtn">Reset</button>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat">
            <div class="stat-label">Algorithm</div>
            <div class="stat-value highlight" id="statAlgo">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Complexity</div>
            <div class="stat-value" id="statComplexity">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Comparisons</div>
            <div class="stat-value" id="statComparisons">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Array Accesses</div>
            <div class="stat-value" id="statAccess">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Time (ms)</div>
            <div class="stat-value" id="statTime">0</div>
        </div>
    </div>

    <!-- Visualization -->
    <div class="vis-wrap">
        <div id="canvas"></div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#2a2a2a;border:1px solid #555"></div>Unsorted</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--comparing)"></div>Comparing</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--swapping)"></div>Swapping</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--pivot)"></div>Pivot</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--sorted)"></div>Sorted</div>
        </div>
    </div>

    <footer>
        <div class="footer-text">SORT.EXE — ALGORITHM VISUALIZER</div>
        <div class="footer-text">© 2026</div>
    </footer>

</div>

<script>
class SortingVisualizer {
    constructor() {
        this.array = [];
        this.arraySize = 60;
        this.speed = 40;
        this.selectedAlgo = null;
        this.selectedComplexity = null;
        this.sorting = false;
        this.paused = false;
        this.stats = { comparisons: 0, access: 0, startTime: 0 };

        this.$canvas    = document.getElementById('canvas');
        this.$sizeSlider  = document.getElementById('sizeSlider');
        this.$speedSlider = document.getElementById('speedSlider');
        this.$sizeVal   = document.getElementById('sizeVal');
        this.$speedVal  = document.getElementById('speedVal');
        this.$startBtn  = document.getElementById('startBtn');
        this.$pauseBtn  = document.getElementById('pauseBtn');
        this.$resetBtn  = document.getElementById('resetBtn');

        this._bindEvents();
        this.generateArray();
    }

    _bindEvents() {
        this.$sizeSlider.addEventListener('input', e => {
            this.arraySize = +e.target.value;
            this.$sizeVal.textContent = this.arraySize;
            if (!this.sorting) { this.generateArray(); this._rebuildBars(); }
        });
        this.$speedSlider.addEventListener('input', e => {
            this.speed = +e.target.value;
            this.$speedVal.textContent = this.speed;
        });
        document.getElementById('algoList').addEventListener('click', e => {
            const btn = e.target.closest('.algo-btn');
            if (!btn || this.sorting) return;
            document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.selectedAlgo = btn.dataset.algo;
            this.selectedComplexity = btn.dataset.complexity;
            document.getElementById('statAlgo').textContent = btn.textContent.trim();
            document.getElementById('statComplexity').textContent = this.selectedComplexity;
        });
        this.$startBtn.addEventListener('click', () => this.start());
        this.$pauseBtn.addEventListener('click', () => this.togglePause());
        this.$resetBtn.addEventListener('click', () => this.reset());
    }

    generateArray() {
        this.array = Array.from({ length: this.arraySize }, () =>
            Math.floor(Math.random() * 380) + 20
        );
        this.render();
    }

    render(comparing = [], swapping = [], sorted = [], pivot = -1) {
        const bars = this.$canvas.querySelectorAll('.bar');
        this.array.forEach((val, i) => {
            const bar = bars[i];
            if (!bar) return;
            bar.style.height = `${(val / 400) * 100}%`;
            bar.className = 'bar';
            const label = bar.querySelector('.bar-label');
            if (label) label.textContent = val;
            if (sorted.includes(i))        bar.classList.add('sorted');
            else if (pivot === i)           bar.classList.add('pivot');
            else if (swapping.includes(i))  bar.classList.add('swapping');
            else if (comparing.includes(i)) bar.classList.add('comparing');
        });
    }

    _rebuildBars() {
        this.$canvas.innerHTML = '';
        this.$canvas.classList.toggle('show-labels', this.arraySize <= 50);
        this.array.forEach(val => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            const label = document.createElement('span');
            label.className = 'bar-label';
            label.textContent = val;
            bar.appendChild(label);
            this.$canvas.appendChild(bar);
        });
        this.render();
    }

    sleep(ms) {
        return new Promise(resolve => {
            const tick = () => this.paused ? setTimeout(tick, 100) : setTimeout(resolve, ms);
            tick();
        });
    }

    updateStats() {
        document.getElementById('statComparisons').textContent = this.stats.comparisons;
        document.getElementById('statAccess').textContent = this.stats.access;
        document.getElementById('statTime').textContent = Math.floor(Date.now() - this.stats.startTime);
    }

    async start() {
        if (!this.selectedAlgo || this.sorting) return;
        this.sorting = true;
        this.paused = false;
        this.stats = { comparisons: 0, access: 0, startTime: Date.now() };
        this.$startBtn.disabled = true;
        this.$pauseBtn.disabled = false;
        this.$resetBtn.disabled = true;

        const map = {
            bubble: () => this.bubbleSort(),
            selection: () => this.selectionSort(),
            insertion: () => this.insertionSort(),
            merge: () => this.mergeSort(),
            quick: () => this.quickSort(),
            heap: () => this.heapSort(),
            shell: () => this.shellSort(),
        };
        await map[this.selectedAlgo]();
        await this.showSortedWave();
        this._finish();
    }

    async showSortedWave() {
        for (let i = 0; i < this.array.length; i++) {
            this.render([], [], Array.from({ length: i + 1 }, (_, k) => k));
            await this.sleep(8);
        }
    }

    _finish() {
        this.sorting = false;
        this.$startBtn.disabled = false;
        this.$pauseBtn.disabled = true;
        this.$resetBtn.disabled = false;
        this.updateStats();
    }

    togglePause() {
        this.paused = !this.paused;
        this.$pauseBtn.textContent = this.paused ? 'Resume' : 'Pause';
    }

    reset() {
        this.sorting = false;
        this.paused = false;
        this.$startBtn.disabled = false;
        this.$pauseBtn.disabled = true;
        this.$pauseBtn.textContent = 'Pause';
        this.$resetBtn.disabled = false;
        this.stats = { comparisons: 0, access: 0, startTime: 0 };
        this.updateStats();
        this.generateArray();
        this._rebuildBars();
    }

    // ─── Algorithms ───

    async bubbleSort() {
        const n = this.array.length;
        for (let i = 0; i < n - 1; i++) {
            for (let j = 0; j < n - i - 1; j++) {
                this.stats.comparisons++; this.stats.access += 2;
                this.render([j, j + 1]);
                await this.sleep(this.speed);
                if (this.array[j] > this.array[j + 1]) {
                    this.render([], [j, j + 1]);
                    await this.sleep(this.speed);
                    [this.array[j], this.array[j + 1]] = [this.array[j + 1], this.array[j]];
                    this.stats.access += 4;
                }
                this.updateStats();
            }
        }
    }

    async selectionSort() {
        const n = this.array.length;
        for (let i = 0; i < n; i++) {
            let min = i;
            for (let j = i + 1; j < n; j++) {
                this.stats.comparisons++; this.stats.access += 2;
                this.render([min, j], [], Array.from({ length: i }, (_, k) => k));
                await this.sleep(this.speed);
                if (this.array[j] < this.array[min]) min = j;
                this.updateStats();
            }
            if (min !== i) {
                this.render([], [i, min], Array.from({ length: i }, (_, k) => k));
                await this.sleep(this.speed);
                [this.array[i], this.array[min]] = [this.array[min], this.array[i]];
                this.stats.access += 4;
            }
        }
    }

    async insertionSort() {
        const n = this.array.length;
        for (let i = 1; i < n; i++) {
            let key = this.array[i], j = i - 1;
            this.stats.access++;
            while (j >= 0 && this.array[j] > key) {
                this.stats.comparisons++; this.stats.access += 2;
                this.render([j, j + 1]);
                await this.sleep(this.speed);
                this.array[j + 1] = this.array[j];
                this.stats.access += 2;
                j--;
                this.updateStats();
            }
            this.array[j + 1] = key;
            this.stats.access++;
        }
    }

    async mergeSort() { await this._mergeSplit(0, this.array.length - 1); }

    async _mergeSplit(l, r) {
        if (l >= r) return;
        const m = Math.floor((l + r) / 2);
        await this._mergeSplit(l, m);
        await this._mergeSplit(m + 1, r);
        await this._merge(l, m, r);
    }

    async _merge(l, m, r) {
        const L = this.array.slice(l, m + 1);
        const R = this.array.slice(m + 1, r + 1);
        let i = 0, j = 0, k = l;
        while (i < L.length && j < R.length) {
            this.stats.comparisons++; this.stats.access += 2;
            this.render([l + i, m + 1 + j]);
            await this.sleep(this.speed);
            this.array[k++] = L[i] <= R[j] ? (i++, L[i - 1]) : (j++, R[j - 1]);
            this.stats.access++;
            this.updateStats();
        }
        while (i < L.length) { this.array[k++] = L[i++]; this.stats.access++; }
        while (j < R.length) { this.array[k++] = R[j++]; this.stats.access++; }
    }

    async quickSort() { await this._quickSplit(0, this.array.length - 1); }

    async _quickSplit(lo, hi) {
        if (lo >= hi) return;
        const p = await this._partition(lo, hi);
        await this._quickSplit(lo, p - 1);
        await this._quickSplit(p + 1, hi);
    }

    async _partition(lo, hi) {
        const pivot = this.array[hi];
        this.stats.access++;
        let i = lo - 1;
        for (let j = lo; j < hi; j++) {
            this.stats.comparisons++; this.stats.access++;
            this.render([j], [], [], hi);
            await this.sleep(this.speed);
            if (this.array[j] < pivot) {
                i++;
                this.render([], [i, j], [], hi);
                await this.sleep(this.speed);
                [this.array[i], this.array[j]] = [this.array[j], this.array[i]];
                this.stats.access += 4;
            }
            this.updateStats();
        }
        [this.array[i + 1], this.array[hi]] = [this.array[hi], this.array[i + 1]];
        this.stats.access += 4;
        return i + 1;
    }

    async heapSort() {
        const n = this.array.length;
        for (let i = Math.floor(n / 2) - 1; i >= 0; i--) await this._heapify(n, i);
        for (let i = n - 1; i > 0; i--) {
            this.render([], [0, i]);
            await this.sleep(this.speed);
            [this.array[0], this.array[i]] = [this.array[i], this.array[0]];
            this.stats.access += 4;
            await this._heapify(i, 0);
            this.updateStats();
        }
    }

    async _heapify(n, i) {
        let largest = i, l = 2 * i + 1, r = 2 * i + 2;
        if (l < n) { this.stats.comparisons++; this.stats.access += 2; if (this.array[l] > this.array[largest]) largest = l; }
        if (r < n) { this.stats.comparisons++; this.stats.access += 2; if (this.array[r] > this.array[largest]) largest = r; }
        if (largest !== i) {
            this.render([], [i, largest]);
            await this.sleep(this.speed);
            [this.array[i], this.array[largest]] = [this.array[largest], this.array[i]];
            this.stats.access += 4;
            await this._heapify(n, largest);
        }
        this.updateStats();
    }

    async shellSort() {
        const n = this.array.length;
        for (let gap = Math.floor(n / 2); gap > 0; gap = Math.floor(gap / 2)) {
            for (let i = gap; i < n; i++) {
                const temp = this.array[i]; this.stats.access++;
                let j = i;
                while (j >= gap && this.array[j - gap] > temp) {
                    this.stats.comparisons++; this.stats.access += 2;
                    this.render([j, j - gap]);
                    await this.sleep(this.speed);
                    this.array[j] = this.array[j - gap];
                    this.stats.access += 2;
                    j -= gap;
                    this.updateStats();
                }
                this.array[j] = temp; this.stats.access++;
            }
        }
    }
}

// Init after DOM ready
window.addEventListener('DOMContentLoaded', () => {
    const viz = new SortingVisualizer();
    viz._rebuildBars();

    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel  = document.getElementById('themeLabel');
    themeToggle.addEventListener('click', () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        if (isLight) {
            document.documentElement.removeAttribute('data-theme');
            themeToggle.querySelector('.theme-icon').textContent = '☀️';
            themeLabel.textContent = 'Light';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            themeToggle.querySelector('.theme-icon').textContent = '🌙';
            themeLabel.textContent = 'Dark';
        }
    });
});
